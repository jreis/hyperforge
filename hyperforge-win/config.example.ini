; HyperForge for Windows — copy to config.ini and edit.
; config.ini is gitignored (keep personal paths out of git).

[general]
; Caps → Hyper (#^!+). Set 0 to leave Caps alone (e.g. if you use PowerToys).
caps_to_hyper=1
; Accelerated mouse wheel. Set 0 to use OS scrolling only.
wheel_accel=1
; Keep-alive idle nudge (Hyper+J). Interval minutes.
keepalive_minutes=5
; Show small toasts for toggles / copies
toasts=1

[paths]
; Leave blank to use common install locations / PATH.
notepad=
vscode=C:\Program Files\Microsoft VS Code\Code.exe
chrome=C:\Program Files\Google\Chrome\Application\chrome.exe
outlook=C:\Program Files\Microsoft Office\root\Office16\OUTLOOK.EXE
teams=
; Windows Terminal
terminal=wt
; Optional: Agent Ransack / file search
search=
; Optional: open this script or notes in editor (Hyper+H)
edit_target=
; Favorites INI for quick menu (optional)
favorites_ini=
; Folder of .txt snippets for quick menu (optional)
quickref_dir=

[apps]
; Hyper + key → path or command. Keys are single characters where possible.
; Use full path if not on PATH.
n=notepad
v=
c=
t=
e=explorer.exe
; Hyper+4 → Outlook (digit keys need the digit)
4=
; Optional URL for Hyper+S (leave blank if unused)
hyper_s_url=

[snippets]
; hotstring=expansion  (use `n for newlines)
,mach=
,v=
@@=you@example.com
tj=Thanks,`nYour Name

[network]
; Whois / reverse DNS are generic; leave as-is unless you have a custom endpoint.
arin_whois=https://whois.arin.net/ui/query.do
